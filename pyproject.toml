[tool.poetry]
name = "project-name"
version = "0.1.0"
description = "Project name"
authors = ["Branch Vincent <branchevincent@gmail.com>"]
readme = "README.md"
repository = "https://github.com/branchvincent/project-name"
packages = [{ include = "project_name", from = "src" }]
classifiers = ["Private :: Do Not Upload"]

[tool.poetry.dependencies]
python = "^3.10"

[tool.poetry.group.dev.dependencies]
mkdocs = ">=1"
mkdocs-material = ">=9"
mypy = ">=1"
pre-commit = ">=3"
pytest = ">=8"
ruff = ">=0.6"
taskipy = ">=1"

[tool.taskipy.tasks]
clean = { cmd = "rm -rf .*_cache/ build/ dist/ *.egg-info", help = "Remove build artifacts" }
docs = { cmd = "mkdocs serve -f docs/mkdocs.yaml", help = "Serve documentation"}
lint = { cmd = "pre-commit run --all-files", help = "Run linters and formatters" }
test = { cmd = "pytest", help = "Run tests" }

[tool.ruff]
fix = true
lint = { select = ["B", "E", "F", "I", "SIM", "UP"] }

[tool.mypy]
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]

[build-system]
requires = ["poetry-core>=1.0"]
build-backend = "poetry.core.masonry.api"
